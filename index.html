<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueOps: Command Center</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.85);
            --primary: #06b6d4; /* Cyan */
            --primary-glow: rgba(6, 182, 212, 0.5);
            --danger: #ef4444; /* Red */
            --danger-glow: rgba(239, 68, 68, 0.5);
            --success: #10b981; /* Green */
            --text-main: #e2e8f0;
            --font-mono: 'Courier New', Courier, monospace;
            --font-ui: system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Rain Effect Background */
            background-image: linear-gradient(to bottom, #0f172a 0%, #1e293b 100%);
            position: relative;
        }

        /* Rain Animation */
        .rain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg"><line x1="10" y1="0" x2="10" y2="20" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></svg>');
            background-size: 20px 20px;
            animation: rainFall 0.5s linear infinite;
            opacity: 0.3;
            z-index: 0;
        }

        @keyframes rainFall {
            from { background-position: 0 0; }
            to { background-position: 0 20px; }
        }

        /* --- Header --- */
        header {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-bar {
            display: flex;
            gap: 15px;
        }

        .stat-badge {
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-badge.critical { color: var(--danger); border-color: var(--danger); box-shadow: 0 0 10px var(--danger-glow); }
        .stat-badge.safe { color: var(--success); border-color: var(--success); }

        /* --- Main Layout --- */
        main {
            display: flex;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        aside {
            width: 320px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .panel {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { background: rgba(255,255,255,0.1); }
        button:active { transform: scale(0.98); }

        button.primary { background: var(--primary); color: #000; border: none; }
        button.primary:hover { background: #22d3ee; box-shadow: 0 0 15px var(--primary-glow); }
        
        button.danger { background: var(--danger); color: white; border: none; }
        button.danger:hover { background: #f87171; box-shadow: 0 0 15px var(--danger-glow); }

        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* Log Terminal */
        .terminal {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #33ff00;
        }
        .terminal p { margin-bottom: 4px; border-bottom: 1px solid #111; }
        .terminal span.time { color: #666; margin-right: 5px; }

        /* Map Area */
        #map-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            cursor: crosshair;
        }

        /* Grid Overlay */
        .grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Map Elements */
        .entity {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: top 0.1s linear, left 0.1s linear; /* Smooth drag */
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
        }

        /* Buildings */
        .building {
            width: 80px;
            height: 80px;
            background: #475569;
            border: 2px solid #334155;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 2;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #94a3b8;
        }
        .building.damaged { background: #334155; border-color: #1e293b; }

        /* Victims */
        .victim {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.9);
            border: 3px solid var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--danger-glow);
            z-index: 5;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        .victim::after { content: "🆘"; font-size: 16px; }
        .victim.rescued { border-color: var(--success); background: var(--success); }
        .victim.rescued::after { content: "✅"; }

        /* Rescuer Drone */
        .drone {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary-glow);
            z-index: 20;
            cursor: grab;
        }
        .drone::after { content: "🛸"; font-size: 24px; }
        .drone:active { cursor: grabbing; }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--primary);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            white-space: nowrap;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-panel);
            border-left: 4px solid var(--primary);
            padding: 15px 25px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* Mobile Toggle */
        .menu-toggle { display: none; }

        @media (max-width: 768px) {
            aside { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); z-index: 50; }
            aside.open { transform: translateX(0); }
            .menu-toggle { display: block; background: none; border: none; color: white; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="rain"></div>

    <header>
        <div class="brand">
            <button class="menu-toggle" id="menu-btn">☰</button>
            <span>RescueOps</span> <span style="font-size:0.8em; opacity:0.7">v2.0</span>
        </div>
        <div class="status-bar">
            <div class="stat-badge critical">⚠️ <span id="critical-count">0</span> Trapped</div>
            <div class="stat-badge safe">✅ <span id="saved-count">0</span> Rescued</div>
            <div class="stat-badge" style="color:var(--primary)">🔋 <span id="battery-level">100%</span></div>
        </div>
    </header>

    <main>
        <aside id="sidebar">
            <div class="panel">
                <h3>Drone Controls</h3>
                <div class="btn-grid">
                    <button id="btn-scan" class="primary">
                        <span>📡</span> Scan Area
                    </button>
                    <button id="btn-auto" class="primary">
                        <span>🤖</span> Auto-Pilot
                    </button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="mission-progress"></div>
                </div>
                <div style="text-align:right; font-size:0.8rem; color:#888; margin-top:5px;">
                    Mission: <span id="mission-text">Idle</span>
                </div>
            </div>

            <div class="panel">
                <h3>Map Tools</h3>
                <button id="btn-reset">
                    <span>🔄</span> Reset Simulation
                </button>
            </div>

            <div class="terminal" id="terminal">
                <p><span class="time">00:00</span>System initialized...</p>
                <p><span class="time">00:00</span>Waiting for command...</p>
            </div>
        </aside>

        <section id="map-container">
            <div class="grid"></div>
            <div id="tooltip"></div>
            <!-- Entities injected here -->
        </section>
    </main>

    <div id="toast">Message</div>

    <script>
        // --- State Management ---
        const state = {
            victims: [],
            rescuers: [],
            buildings: [],
            criticalCount: 0,
            savedCount: 0,
            battery: 100,
            isScanning: false,
            isAutoPilot: false,
            isDragging: false,
            lastMousePos: { x: 0, y: 0 }
        };

        // --- DOM Elements ---
        const mapContainer = document.getElementById('map-container');
        const terminal = document.getElementById('terminal');
        const toastEl = document.getElementById('toast');
        const tooltip = document.getElementById('tooltip');
        
        // Stats
        const elCritical = document.getElementById('critical-count');
        const elSaved = document.getElementById('saved-count');
        const elBattery = document.getElementById('battery-level');
        const elProgress = document.getElementById('mission-progress');
        const elMissionText = document.getElementById('mission-text');

        // Buttons
        const btnScan = document.getElementById('btn-scan');
        const btnAuto = document.getElementById('btn-auto');
        const btnReset = document.getElementById('btn-reset');
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');

        // --- Initialization ---
        function init() {
            generateMap();
            updateStats();
            addLog("System Online. Weather conditions: STORM.");
            addLog("Waiting for drone deployment.");
        }

        // --- Map Generation ---
        function generateMap() {
            // Cleanup
            document.querySelectorAll('.entity').forEach(el => el.remove());
            state.victims = [];
            state.buildings = [];
            state.battery = 100;
            state.isAutoPilot = false;
            btnAuto.innerHTML = '<span>🤖</span> Auto-Pilot';
            btnAuto.classList.remove('danger'); // Reset style
            elMissionText.innerText = "Idle";
            elProgress.style.width = '0%';

            const w = mapContainer.clientWidth;
            const h = mapContainer.clientHeight;

            // 1. Buildings
            for(let i=0; i<5; i++) {
                const b = document.createElement('div');
                b.className = 'entity building damaged';
                b.innerHTML = '🏚️';
                const x = Math.random() * (w - 120) + 60;
                const y = Math.random() * (h - 120) + 60;
                b.style.left = x + 'px';
                b.style.top = y + 'px';
                mapContainer.appendChild(b);
                state.buildings.push({ id: i, x, y, element: b });
            }

            // 2. Victims
            for(let i=0; i<6; i++) {
                const v = document.createElement('div');
                v.className = 'entity victim';
                v.dataset.id = i;
                v.style.display = 'none';
                
                // Place inside a random building
                const building = state.buildings[Math.floor(Math.random() * state.buildings.length)];
                const ox = (Math.random() - 0.5) * 50;
                const oy = (Math.random() - 0.5) * 50;
                
                v.style.left = (building.x + ox) + 'px';
                v.style.top = (building.y + oy) + 'px';
                
                v.addEventListener('mouseenter', (e) => showTooltip(e, i));
                v.addEventListener('mouseleave', hideTooltip);
                mapContainer.appendChild(v);
                state.victims.push({ id: i, x: building.x + ox, y: building.y + oy, element: v, rescued: false });
            }

            // 3. Rescuer Drone (Starts hidden or at edge)
            const drone = document.createElement('div');
            drone.className = 'entity drone';
            drone.id = 'drone';
            drone.style.display = 'none';
            drone.style.left = '50%';
            drone.style.top = '50%';
            
            // Drag Events
            drone.addEventListener('mousedown', startDrag);
            drone.addEventListener('mouseenter', (e) => showTooltip(e, 'drone'));
            drone.addEventListener('mouseleave', hideTooltip);
            
            mapContainer.appendChild(drone);
            state.rescuers.push({ id: 'drone', x: w/2, y: h/2, element: drone });
        }

        // --- Interaction Logic ---

        // Scan
        btnScan.addEventListener('click', () => {
            if(state.isScanning || state.isAutoPilot) return;
            state.isScanning = true;
            
            btnScan.disabled = true;
            btnScan.innerHTML = '<span>📡</span> Scanning...';
            mapContainer.classList.add('scanning');
            addLog("Initiating deep scan...");

            setTimeout(() => {
                state.victims.forEach(v => {
                    v.element.style.display = 'flex';
                    v.element.style.transform = 'translate(-50%, -50%) scale(0)';
                    setTimeout(() => v.element.style.transform = 'translate(-50%, -50%) scale(1)', 50);
                });
                
                state.rescuers[0].element.style.display = 'flex';
                mapContainer.classList.remove('scanning');
                state.isScanning = false;
                
                btnScan.disabled = false;
                btnScan.innerHTML = '<span>📡</span> Scan Area';
                
                updateStats();
                addLog("Scan Complete. 6 Victims Detected.");
                showToast("Scan Complete. Targets Acquired.", "success");
            }, 1500);
        });

        // Auto Pilot (A* Pathfinding Simplified)
        btnAuto.addEventListener('click', () => {
            if(state.isScanning || state.isAutoPilot) return;
            
            // Toggle
            state.isAutoPilot = !state.isAutoPilot;
            
            if(state.isAutoPilot) {
                btnAuto.innerHTML = '<span>🛑</span> Stop';
                btnAuto.classList.add('danger');
                elMissionText.innerText = "Auto-Rescue Mode Active";
                addLog("Auto-Pilot engaged. Calculating shortest path...");
                autoPilotLoop();
            } else {
                btnAuto.innerHTML = '<span>🤖</span> Auto-Pilot';
                btnAuto.classList.remove('danger');
                elMissionText.innerText = "Idle";
                addLog("Auto-Pilot disengaged.");
            }
        });

        function autoPilotLoop() {
            if(!state.isAutoPilot) return;

            const drone = state.rescuers[0];
            // Find nearest
            let nearest = null;
            let minDist = Infinity;

            state.victims.forEach(v => {
                if(v.rescued) return;
                const d = Math.hypot(v.x - drone.x, v.y - drone.y);
                if(d < minDist) {
                    minDist = d;
                    nearest = v;
                }
            });

            if(!nearest) {
                state.isAutoPilot = false;
                btnAuto.innerHTML = '<span>🤖</span> Auto-Pilot';
                elMissionText.innerText = "All Clear";
                addLog("All targets rescued.");
                showToast("Mission Accomplished!", "success");
                return;
            }

            // Move
            animateMovement(drone.element, nearest.x, nearest.y, () => {
                rescueVictim(nearest);
                if(state.isAutoPilot) autoPilotLoop();
            });
        }

        // Manual Drag
        function startDrag(e) {
            if(state.isAutoPilot) return;
            state.isDragging = true;
            state.lastMousePos = { x: e.clientX, y: e.clientY };
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function onDrag(e) {
            if(!state.isDragging) return;
            const rect = mapContainer.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            // Constrain to map
            x = Math.max(25, Math.min(x, rect.width - 25));
            y = Math.max(25, Math.min(y, rect.height - 25));

            const drone = state.rescuers[0];
            drone.x = x;
            drone.y = y;
            drone.element.style.left = x + 'px';
            drone.element.style.top = y + 'px';
        }

        function stopDrag() {
            state.isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // Rescue Logic
        function rescueVictim(v) {
            v.rescued = true;
            v.element.innerHTML = "✅";
            v.element.style.borderColor = "var(--success)";
            v.element.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.5)";
            
            // Remove after delay
            setTimeout(() => {
                v.element.style.opacity = '0';
                setTimeout(() => v.element.remove(), 500);
            }, 1000);

            state.savedCount++;
            updateStats();
            addLog(`Victim ${v.id} rescued successfully.`);
            
            // Battery drain
            state.battery = Math.max(0, state.battery - 5);
            updateStats();
        }

        // --- Helpers ---
        function animateMovement(element, tx, ty, callback) {
            const sx = parseFloat(element.style.left);
            const sy = parseFloat(element.style.top);
            const startTime = performance.now();
            const duration = 600; // Faster travel

            function step(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease out
                const ease = 1 - Math.pow(1 - progress, 3);

                const curX = sx + (tx - sx) * ease;
                const curY = sy + (ty - sy) * ease;

                element.style.left = curX + 'px';
                element.style.top = curY + 'px';

                if(progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    if(callback) callback();
                }
            }
            requestAnimationFrame(step);
        }

        function updateStats() {
            state.criticalCount = state.victims.filter(v => !v.rescued).length;
            elCritical.innerText = state.criticalCount;
            elSaved.innerText = state.savedCount;
            elBattery.innerText = state.battery + '%';
            
            // Progress Bar
            const total = 6;
            const pct = (state.savedCount / total) * 100;
            elProgress.style.width = pct + '%';

            if(state.battery < 20) elBattery.style.color = 'var(--danger)';
            else elBattery.style.color = 'var(--primary)';
        }

        function addLog(msg) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            const p = document.createElement('p');
            p.innerHTML = `<span class="time">${timeStr}</span> ${msg}`;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function showToast(msg, type = 'normal') {
            toastEl.innerText = msg;
            toastEl.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--primary)';
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        function showTooltip(e, id) {
            let text = "";
            if (id === 'drone') {
                text = `Drone Status: ${state.isAutoPilot ? 'AUTOPILOT' : 'MANUAL'} | Battery: ${state.battery}%`;
            } else {
                const v = state.victims[id];
                text = v.rescued ? "Victim: Safe" : "Victim: Trapped";
            }
            tooltip.innerText = text;
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
            tooltip.style.opacity = 1;
        }

        function hideTooltip() {
            tooltip.style.opacity = 0;
        }

        // Reset
        btnReset.addEventListener('click', () => {
            if(confirm("Reset simulation?")) {
                generateMap();
                updateStats();
                addLog("Simulation reset.");
            }
        });

        // Mobile Menu
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // Run
        init();

    </script>
</body>
</html>
